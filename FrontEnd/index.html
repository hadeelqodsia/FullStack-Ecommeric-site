<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Brand – eCommerce</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
/* ===== RESET & VARIABLES ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1677ff;
  --blue-dark:#0e5cd8;
  --blue-light:#e6f0ff;
  --teal:#00b6a4;
  --orange:#ff6b00;
  --red:#e53935;
  --green:#22a861;
  --yellow:#f5a623;
  --gray1:#f7f8fa;
  --gray2:#eef0f3;
  --gray3:#d8dce4;
  --gray4:#a0a8b4;
  --gray5:#6b7280;
  --gray6:#374151;
  --dark:#111827;
  --white:#fff;
  --shadow-sm:0 1px 4px rgba(0,0,0,.08);
  --shadow:0 2px 12px rgba(0,0,0,.10);
  --shadow-lg:0 6px 32px rgba(0,0,0,.13);
  --radius:8px;
  --font:'Barlow',sans-serif;
}
body{font-family:var(--font);font-size:14px;color:var(--dark);background:var(--gray1);min-height:100vh}
a{text-decoration:none;color:inherit}
img{display:block;width:100%;height:100%;object-fit:cover}
ul{list-style:none}
button{cursor:pointer;font-family:var(--font);border:none;outline:none}
input{font-family:var(--font)}

/* ===== PAGE NAV ===== */
#page-nav{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;
  background:var(--dark);color:#fff;border-radius:40px;
  display:none;gap:0;overflow:hidden;box-shadow:var(--shadow-lg);
}
#page-nav button{
  background:transparent;color:#ccc;padding:10px 18px;font-size:13px;font-weight:600;
  transition:background .2s,color .2s;border-right:1px solid #2d2d2d;
}
#page-nav button:last-child{border-right:none}
#page-nav button.active,#page-nav button:hover{background:var(--blue);color:#fff}

/* ===== PAGES ===== */
.page{display:none;min-height:100vh;flex-direction:column}
.page.active{display:flex}

/* ===== SHARED HEADER ===== */
.site-header{
  background:var(--white);border-bottom:1px solid var(--gray2);
  position:sticky;top:0;z-index:100;
}
.header-top{
  background:var(--blue);color:#fff;font-size:12px;
  display:flex;align-items:center;justify-content:space-between;
  padding:4px 24px;gap:8px;
}
.header-top a{color:#fff;opacity:.85;font-size:12px}
.header-top a:hover{opacity:1}
.header-main{
  display:flex;align-items:center;gap:16px;padding:10px 24px;
}
.logo{
  font-family:'Nunito',sans-serif;font-size:22px;font-weight:800;
  color:var(--blue);display:flex;align-items:center;gap:6px;min-width:90px;
}
.logo span{
  width:28px;height:28px;background:var(--blue);border-radius:6px;
  display:grid;place-items:center;
}
.logo span svg{width:16px;height:16px;fill:#fff}
.search-bar{
  flex:1;display:flex;border:2px solid var(--blue);border-radius:6px;overflow:hidden;
}
.search-bar input{
  flex:1;border:none;outline:none;padding:8px 14px;font-size:14px;color:var(--dark);
}
.search-bar select{
  border:none;border-left:1px solid var(--gray3);outline:none;
  padding:0 10px;font-size:13px;background:var(--gray1);color:var(--gray5);cursor:pointer;
}
.search-bar button{
  background:var(--blue);color:#fff;padding:0 20px;font-size:14px;font-weight:600;
  transition:background .2s;
}
.search-bar button:hover{background:var(--blue-dark)}
.header-icons{display:flex;align-items:center;gap:18px}
.icon-btn{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:11px;color:var(--gray5);cursor:pointer;position:relative;
  transition:color .2s;
}
.icon-btn:hover{color:var(--blue)}
.icon-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
.badge{
  position:absolute;top:-4px;right:-6px;background:var(--red);color:#fff;
  border-radius:999px;font-size:10px;padding:1px 5px;font-weight:700;
}
.nav-cats{
  display:flex;gap:0;border-top:1px solid var(--gray2);padding:0 24px;overflow-x:auto;
}
.nav-cats a{
  padding:8px 14px;font-size:13px;font-weight:500;color:var(--gray6);
  white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s;
}
.nav-cats a:hover,.nav-cats a.active{color:var(--blue);border-bottom-color:var(--blue)}

/* ===== SHARED FOOTER ===== */
.site-footer{
  background:var(--white);border-top:1px solid var(--gray2);margin-top:40px;
}
.footer-cta{
  background:var(--blue);color:#fff;padding:18px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
}
.footer-cta p{font-size:14px;font-weight:600}
.footer-cta small{font-size:12px;opacity:.8;display:block}
.footer-cta input{
  border:none;outline:none;padding:8px 14px;border-radius:6px;
  width:220px;font-size:13px;
}
.footer-cta button{
  background:var(--orange);color:#fff;padding:8px 20px;border-radius:6px;
  font-size:13px;font-weight:700;transition:background .2s;
}
.footer-cta button:hover{background:#e55a00}
.footer-grid{
  display:grid;grid-template-columns:repeat(5,1fr);gap:32px;padding:32px 24px;
}
.footer-col h4{font-size:14px;font-weight:700;color:var(--dark);margin-bottom:12px}
.footer-col ul li{margin-bottom:6px}
.footer-col ul li a{color:var(--gray5);font-size:13px;transition:color .2s}
.footer-col ul li a:hover{color:var(--blue)}
.footer-apps{display:flex;gap:8px;margin-top:8px}
.app-btn{
  background:var(--dark);color:#fff;border-radius:6px;padding:6px 12px;
  font-size:11px;font-weight:600;display:flex;align-items:center;gap:6px;cursor:pointer;
}
.app-btn svg{width:16px;height:16px;fill:#fff}
.footer-bottom{
  border-top:1px solid var(--gray2);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;
  font-size:12px;color:var(--gray4);
}
.flag{display:inline-flex;align-items:center;gap:4px;cursor:pointer}

/* ===== IMAGE PLACEHOLDER ===== */
.img-ph{
  background:var(--gray2);position:relative;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
}
.img-ph::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--gray2) 0%,var(--gray3) 50%,var(--gray2) 100%);
  background-size:200% 200%;animation:shimmer 1.6s infinite;
}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
.img-ph img{position:relative;z-index:1}

/* ===== STARS ===== */
.stars{display:inline-flex;gap:1px;color:var(--yellow);font-size:12px}

/* ===== PILL / BADGE ===== */
.pill{
  display:inline-block;padding:2px 8px;border-radius:999px;
  font-size:11px;font-weight:700;
}
.pill-red{background:#fff0f0;color:var(--red)}
.pill-green{background:#f0faf4;color:var(--green)}
.pill-blue{background:var(--blue-light);color:var(--blue)}
.pill-orange{background:#fff4eb;color:var(--orange)}

/* ===== BUTTONS ===== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:9px 20px;border-radius:6px;font-size:14px;font-weight:600;
  transition:all .2s;cursor:pointer;border:none;
}
.btn-blue{background:var(--blue);color:#fff}
.btn-blue:hover{background:var(--blue-dark)}
.btn-outline{background:transparent;color:var(--blue);border:1.5px solid var(--blue)}
.btn-outline:hover{background:var(--blue-light)}
.btn-orange{background:var(--orange);color:#fff}
.btn-orange:hover{background:#e55a00}
.btn-green{background:var(--green);color:#fff}
.btn-green:hover{background:#1b8a50}
.btn-sm{padding:6px 14px;font-size:13px}
.btn-full{width:100%}

/* ============================================================
   PAGE 1 – HOMEPAGE
============================================================ */
/* Hero Banner */
.hero{display:flex;gap:12px;padding:16px 24px;align-items:stretch}
.hero-slide{
  flex:1;border-radius:var(--radius);overflow:hidden;position:relative;
  min-height:220px;background:linear-gradient(135deg,#0c3f8a,#1677ff);
  display:flex;flex-direction:column;justify-content:flex-end;padding:24px;color:#fff;
}
.hero-slide h2{font-size:24px;font-weight:800;line-height:1.2;margin-bottom:6px}
.hero-slide p{font-size:13px;opacity:.85;margin-bottom:16px}
.hero-img-area{
  position:absolute;right:0;top:0;width:55%;height:100%;
}
.hero-right{display:flex;flex-direction:column;gap:12px;width:220px}
.hero-card{
  flex:1;border-radius:var(--radius);overflow:hidden;position:relative;
  min-height:102px;padding:16px;display:flex;flex-direction:column;justify-content:flex-end;
  color:#fff;
}
.hero-card.teal{background:linear-gradient(135deg,#00877a,#00c4b0)}
.hero-card.orange{background:linear-gradient(135deg,#d14900,#ff6b00)}
.hero-card h3{font-size:15px;font-weight:700}
.hero-card p{font-size:12px;opacity:.85}
.hero-card-img{position:absolute;right:8px;top:8px;width:80px;height:80px;opacity:.85}

/* Category Grid */
.section{padding:0 24px 24px}
.section-header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 14px}
.section-header h2{font-size:18px;font-weight:700;color:var(--dark)}
.section-header a{font-size:13px;color:var(--blue)}
.cat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px}
.cat-card{
  background:var(--white);border-radius:var(--radius);padding:16px 12px;
  text-align:center;cursor:pointer;transition:box-shadow .2s,transform .2s;
  border:1px solid var(--gray2);
}
.cat-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.cat-card-img{
  width:64px;height:64px;border-radius:12px;margin:0 auto 10px;
}
.cat-card h4{font-size:12px;font-weight:600;color:var(--gray6);line-height:1.3}

/* Featured Row */
.prod-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.prod-card{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);
  overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;
  display:flex;flex-direction:column;
}
.prod-card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.prod-card-img{height:160px;flex-shrink:0}
.prod-card-body{padding:10px 12px 14px;flex:1;display:flex;flex-direction:column}
.prod-card-name{font-size:13px;color:var(--gray6);line-height:1.4;margin-bottom:6px;flex:1;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.prod-card-price{font-size:16px;font-weight:700;color:var(--red)}
.prod-card-old{font-size:12px;color:var(--gray4);text-decoration:line-through;margin-left:4px}
.prod-card-meta{display:flex;align-items:center;gap:6px;margin-top:4px}
.prod-card-sold{font-size:11px;color:var(--gray4)}

/* Send Quote Banner */
.quote-banner{
  background:linear-gradient(90deg,#e9f3ff,#d0e8ff);
  border-radius:var(--radius);margin:0 24px;padding:28px 32px;
  display:flex;align-items:center;gap:32px;
}
.quote-banner h2{font-size:20px;font-weight:700;color:var(--dark);margin-bottom:4px}
.quote-banner p{font-size:13px;color:var(--gray5);max-width:340px;line-height:1.6}
.quote-form{
  flex:1;background:var(--white);border-radius:var(--radius);
  padding:20px;box-shadow:var(--shadow);
}
.quote-form h3{font-size:15px;font-weight:700;margin-bottom:14px;color:var(--dark)}
.quote-form input,.quote-form textarea{
  width:100%;border:1px solid var(--gray3);border-radius:6px;
  padding:8px 12px;font-size:13px;color:var(--dark);outline:none;
  margin-bottom:10px;font-family:var(--font);resize:none;
}
.quote-form input:focus,.quote-form textarea:focus{border-color:var(--blue)}

/* Suppliers Map */
.suppliers-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.supplier-card{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);
  padding:14px;display:flex;align-items:center;gap:12px;
  cursor:pointer;transition:box-shadow .2s;
}
.supplier-card:hover{box-shadow:var(--shadow)}
.supplier-img{width:60px;height:60px;border-radius:var(--radius);flex-shrink:0}
.supplier-info h4{font-size:13px;font-weight:600;margin-bottom:2px}
.supplier-info p{font-size:12px;color:var(--gray4)}

/* Regions */
.regions-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-top:12px}
.region-item{
  display:flex;align-items:center;gap:6px;font-size:12px;color:var(--gray5);cursor:pointer;
}
.region-item:hover{color:var(--blue)}
.region-flag{width:20px;height:14px;border-radius:2px;flex-shrink:0}

.list-layout{display:flex;gap:0;flex:1}
.filters-sidebar{
  width:220px;flex-shrink:0;background:var(--white);border-right:1px solid var(--gray2);
  padding:20px 16px;overflow-y:auto;
}
.filter-group{margin-bottom:20px}
.filter-group h4{font-size:13px;font-weight:700;color:var(--dark);margin-bottom:10px;
  padding-bottom:6px;border-bottom:1px solid var(--gray2)}
.filter-item{
  display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;
  font-size:13px;color:var(--gray5);transition:color .2s;
}
.filter-item:hover{color:var(--blue)}
.filter-item input{accent-color:var(--blue);cursor:pointer}
.filter-item label{cursor:pointer}
.price-range{display:flex;align-items:center;gap:6px}
.price-range input{
  flex:1;border:1px solid var(--gray3);border-radius:4px;
  padding:5px 8px;font-size:12px;outline:none;
}
.price-range input:focus{border-color:var(--blue)}
.rating-filter{display:flex;flex-direction:column;gap:6px}
.color-filter{display:flex;flex-wrap:wrap;gap:6px}
.color-dot{
  width:20px;height:20px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:border-color .2s;
}
.color-dot:hover,.color-dot.active{border-color:var(--blue)}
.list-main{flex:1;padding:16px}
.list-toolbar{
  display:flex;align-items:center;justify-content:space-between;
  background:var(--white);border-radius:var(--radius);padding:10px 16px;
  margin-bottom:12px;border:1px solid var(--gray2);
}
.view-btns{display:flex;gap:4px}
.view-btn{
  background:var(--gray1);border:1px solid var(--gray3);border-radius:4px;
  padding:5px 8px;cursor:pointer;display:flex;align-items:center;
  transition:all .2s;
}
.view-btn.active,.view-btn:hover{background:var(--blue);border-color:var(--blue)}
.view-btn svg{width:16px;height:16px;stroke:var(--gray5);fill:none;stroke-width:1.8}
.view-btn.active svg,.view-btn:hover svg{stroke:#fff}
.sort-select{
  border:1px solid var(--gray3);border-radius:4px;padding:5px 10px;
  font-size:13px;outline:none;cursor:pointer;background:var(--white);
}
.list-items{display:flex;flex-direction:column;gap:12px}
.list-item{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);
  display:flex;gap:16px;padding:16px;cursor:pointer;transition:box-shadow .2s;
}
.list-item:hover{box-shadow:var(--shadow)}
.list-item-img{width:140px;height:140px;flex-shrink:0;border-radius:6px}
.list-item-body{flex:1;display:flex;flex-direction:column;gap:6px}
.list-item-name{font-size:15px;font-weight:600;color:var(--dark);line-height:1.4}
.list-item-specs{font-size:12px;color:var(--gray4)}
.list-item-price{font-size:20px;font-weight:800;color:var(--red)}
.list-item-moq{font-size:12px;color:var(--gray4)}
.list-item-desc{font-size:13px;color:var(--gray5);line-height:1.6}
.list-item-actions{display:flex;gap:8px;margin-top:auto}
.list-item-side{
  width:130px;flex-shrink:0;display:flex;flex-direction:column;
  align-items:flex-end;gap:8px;
}
.verified-badge{
  display:inline-flex;align-items:center;gap:4px;font-size:11px;
  color:var(--teal);font-weight:600;background:#e8faf9;padding:3px 8px;border-radius:4px;
}
.verified-badge svg{width:12px;height:12px;stroke:var(--teal);fill:none;stroke-width:2.5}
.pagination{
  display:flex;align-items:center;justify-content:center;gap:4px;margin-top:20px;
}
.page-btn{
  width:32px;height:32px;border-radius:4px;border:1px solid var(--gray3);
  background:var(--white);font-size:13px;display:grid;place-items:center;
  cursor:pointer;transition:all .2s;
}
.page-btn.active,.page-btn:hover{background:var(--blue);border-color:var(--blue);color:#fff}

/* ============================================================
   PAGE 3 – PRODUCT LIST (GRID VIEW)
============================================================ */
.grid-items{
  display:grid;grid-template-columns:repeat(3,1fr);gap:12px;
}
.grid-item{
  background:var(--white);border-radius:var(--radius);border:1px solid var(--gray2);
  overflow:hidden;cursor:pointer;transition:box-shadow .2s,transform .2s;
}
.grid-item:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.grid-item-img{height:180px}
.grid-item-body{padding:12px}
.grid-item-name{font-size:13px;color:var(--gray6);line-height:1.4;margin-bottom:8px;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.grid-item-price{font-size:18px;font-weight:800;color:var(--red)}
.grid-item-moq{font-size:12px;color:var(--gray4)}
.grid-item-meta{display:flex;align-items:center;justify-content:space-between;margin-top:6px}

/* ============================================================
   PAGE 4 – PRODUCT DETAIL
============================================================ */
.detail-layout{display:flex;gap:0;flex:1}
.detail-main{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.breadcrumb{font-size:12px;color:var(--gray4);display:flex;align-items:center;gap:4px}
.breadcrumb a{color:var(--blue)}
.breadcrumb span{color:var(--gray3)}
.detail-top{display:flex;gap:24px;background:var(--white);border-radius:var(--radius);
  border:1px solid var(--gray2);padding:24px}
.detail-gallery{width:340px;flex-shrink:0}
.detail-main-img{
  width:100%;height:280px;border-radius:var(--radius);
  border:1px solid var(--gray2);margin-bottom:10px;
}
.detail-thumbs{display:flex;gap:8px}
.detail-thumb{
  width:56px;height:56px;border-radius:6px;border:2px solid var(--gray2);
  cursor:pointer;flex-shrink:0;transition:border-color .2s;
}
.detail-thumb:hover,.detail-thumb.active{border-color:var(--blue)}
.detail-info{flex:1}
.detail-info h1{font-size:20px;font-weight:700;line-height:1.4;margin-bottom:10px}
.detail-prices{display:flex;align-items:baseline;gap:8px;margin-bottom:12px;
  padding:14px;background:var(--gray1);border-radius:var(--radius)}
.detail-price-now{font-size:28px;font-weight:800;color:var(--red)}
.detail-price-was{font-size:16px;color:var(--gray4);text-decoration:line-through}
.detail-price-off{font-size:14px;font-weight:700;color:var(--orange)}
.detail-table{width:100%;border-collapse:collapse;margin-bottom:14px}
.detail-table tr{border-bottom:1px solid var(--gray2)}
.detail-table td{padding:8px 4px;font-size:13px}
.detail-table td:first-child{color:var(--gray4);width:130px}
.detail-table td:last-child{font-weight:500;color:var(--dark)}
.color-swatches{display:flex;gap:6px;flex-wrap:wrap}
.swatch{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:2px solid var(--gray3);transition:all .2s;
}
.swatch:hover,.swatch.active{border-color:var(--blue);transform:scale(1.1)}
.size-swatches{display:flex;gap:6px;flex-wrap:wrap}
.size-swatch{
  padding:4px 12px;border:1px solid var(--gray3);border-radius:4px;
  font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;
}
.size-swatch:hover,.size-swatch.active{border-color:var(--blue);color:var(--blue);background:var(--blue-light)}
.qty-control{display:flex;align-items:center;gap:0;border:1px solid var(--gray3);
  border-radius:6px;overflow:hidden;width:fit-content}
.qty-btn{
  background:var(--gray1);border:none;padding:8px 14px;font-size:18px;
  cursor:pointer;transition:background .2s;
}
.qty-btn:hover{background:var(--gray2)}
.qty-input{
  border:none;border-left:1px solid var(--gray3);border-right:1px solid var(--gray3);
  padding:8px 14px;width:60px;text-align:center;font-size:14px;outline:none;
}
.detail-actions{display:flex;gap:10px;margin-top:14px}
.detail-sidebar{
  width:240px;flex-shrink:0;border-left:1px solid var(--gray2);
  background:var(--white);padding:20px 16px;display:flex;flex-direction:column;gap:16px;
}
.seller-card{border:1px solid var(--gray2);border-radius:var(--radius);padding:14px}
.seller-card h4{font-size:14px;font-weight:700;margin-bottom:8px}
.seller-stat{display:flex;justify-content:space-between;font-size:12px;padding:4px 0;

      <div class="summary-row"><span>Shipping</span><span style="color:var(--green)">FREE</span></div>
      <div class="summary-row"><span>Tax (8%)</span><span>$145.42</span></div>
      <div class="summary-row"><span>Discount</span><span style="color:var(--red)">–$182.25</span></div>
      <div class="promo-input">
        <input type="text" placeholder="Promo code…"/>
        <button class="btn btn-outline btn-sm">Apply</button>
      </div>
      <div class="summary-row total"><span>Total</span><span>$1,780.92</span></div>
      <button class="btn btn-orange btn-full" style="margin-top:16px;font-size:15px;padding:12px">Proceed to Checkout →</button>
      <button class="btn btn-outline btn-full" style="margin-top:8px;font-size:13px">PayPal Checkout</button>
      <p style="font-size:11px;color:var(--gray4);text-align:center;margin-top:10px">🔒 Secure SSL Encryption · Trade Assurance Protected</p>
    </div>

    <div class="cart-recs">
      <h3>You May Also Like</h3>
      <div class="cart-rec-grid">
        ${recItems.map(r=>`
          <div class="cart-rec-item">
            <div class="cart-rec-img img-ph" style="background:${r.color}20">
              <img class="product-img" src="${r.img}" alt="${r.name}">
            </div>
            <div class="cart-rec-name">${r.name}</div>
            <div class="cart-rec-price">${r.price}</div>
          </div>`).join('')}
      </div>
    </div>
  </div>
</div>
${footer()}`;
}

const builders = [buildHome, buildListView, buildGridView, buildProductDetail, buildCart];

function showPage(idx){
  document.querySelectorAll('.page').forEach((p,i)=>{
    p.classList.toggle('active', i===idx);
    if(i===idx && !p.dataset.built){
      p.innerHTML = builders[i]();
      p.dataset.built='1';
    }
  });
  document.querySelectorAll('#page-nav button').forEach((b,i)=>b.classList.toggle('active',i===idx));
  window.scrollTo({top:0,behavior:'smooth'});
}

showPage(0);
</script>
</body>
